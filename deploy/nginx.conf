# HTTP → HTTPS redirect
server {
    listen 80;
    server_name ghome.genesismedtech.com;
    return 301 https://$host$request_uri;
}

# HTTPS server
server {
    listen 443 ssl;
    server_name ghome.genesismedtech.com;

    # SSL certificate (wildcard *.genesismedtech.com)
    ssl_certificate     /etc/nginx/ssl/genesismedtech.com.pem;
    ssl_certificate_key /etc/nginx/ssl/genesismedtech.com.key;

    # SSL hardening
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # Security headers
    add_header Strict-Transport-Security "max-age=63072000" always;

    # Frontend static files
    root /var/www/ghome;
    index index.html;

    # API proxy to Spring Boot backend
    location /api/ {
        proxy_pass http://127.0.0.1:10080/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_read_timeout 120s;
    }

    # Uploads - serve directly from /opt/uploads (no backend proxy)
    location /uploads/ {
        alias /opt/uploads/;
    }

    # Vue Router - SPA fallback
    # All frontend routes should serve index.html except /api/ and /uploads/
    location / {
        try_files $uri $uri/ /index.html;
    }

    # WeChat Work callback URL - this is handled by backend API
    # The /m/auth/callback URL in the frontend is a Vue route (SPA),
    # but the WeChat Work backend callback at /api/auth/wecom/callback is proxied above.
    # The enterprise WeChat config should set callback to:
    # https://ghome.genesismedtech.com/api/auth/wecom/callback

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
    gzip_min_length 256;
}
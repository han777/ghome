server {
    listen 80;
    server_name ghome.genesismedtech.com;

    # Frontend static files
    root /opt/apartment/frontend/dist;
    index index.html;

    # API proxy to Spring Boot backend
    location /api/ {
        proxy_pass http://127.0.0.1:10080/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_read_timeout 120s;
    }

    # Uploads - serve directly from /opt/uploads (no backend proxy)
    location /uploads/ {
        alias /opt/uploads/;
    }

    # Vue Router - SPA fallback
    # All frontend routes should serve index.html except /api/ and /uploads/
    location / {
        try_files $uri $uri/ /index.html;
    }

    # WeChat Work callback URL - this is handled by backend API
    # The /m/auth/callback URL in the frontend is a Vue route (SPA),
    # but the WeChat Work backend callback at /api/auth/wecom/callback is proxied above.
    # The enterprise WeChat config should set callback to:
    # http://ghome.genesismedtech.com/api/auth/wecom/callback

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
    gzip_min_length 256;
}